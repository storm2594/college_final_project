server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React router support
    location / {
        try_files $uri /index.html;
    }

    # Optional: If not using an ALB for path-based routing, you could proxy here. 
    # But since we use an ALB (routing /api to the backend target group directly),
    # this is generally handled at the load balancer level.
}
